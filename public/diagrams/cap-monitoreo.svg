<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-labelledby="t d" font-family="'Ubuntu Mono','Menlo','Consolas',monospace">
  <title id="t">Salida del comando: monitoreo de logs</title>
  <desc id="d">Salida simulada de auth.log con intentos fallidos, trazas de sudo y auditd activo.</desc>
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity=".18"/></filter>
  </defs>
  <rect width="720" height="380" fill="#fcefe9"/>
  <rect x="20" y="20" width="680" height="340" rx="10" fill="#300A24" filter="url(#sh)"/>
  <g font-size="12">
    <text x="40" y="56" font-size="13"><tspan fill="#5FD75F" font-weight="700">ubuntu@ubuntu</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#5FB4F3" font-weight="700">~</tspan><tspan fill="#ffffff">$ </tspan><tspan fill="#ffffff">sudo grep "Failed password" /var/log/auth.log | tail -5</tspan></text>
    <text x="40" y="78" fill="#e6e6e6">Jun 19 14:02:11 ubuntu sshd[2841]: <tspan fill="#FF6B6B">Failed password</tspan> for invalid user admin from 185.243.218.41</text>
    <text x="40" y="94" fill="#e6e6e6">Jun 19 14:02:14 ubuntu sshd[2841]: <tspan fill="#FF6B6B">Failed password</tspan> for invalid user root from 185.243.218.41</text>
    <text x="40" y="110" fill="#e6e6e6">Jun 19 14:02:18 ubuntu sshd[2841]: <tspan fill="#FF6B6B">Failed password</tspan> for invalid user test from 91.92.247.10</text>
    <text x="40" y="126" fill="#e6e6e6">Jun 19 14:02:21 ubuntu sshd[2841]: <tspan fill="#FF6B6B">Failed password</tspan> for invalid user oracle from 91.92.247.10</text>
    <text x="40" y="142" fill="#e6e6e6">Jun 19 14:02:24 ubuntu sshd[2841]: <tspan fill="#FF6B6B">Failed password</tspan> for invalid user postgres from 220.181.108.5</text>
    <text x="40" y="170" font-size="13"><tspan fill="#5FD75F" font-weight="700">ubuntu@ubuntu</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#5FB4F3" font-weight="700">~</tspan><tspan fill="#ffffff">$ </tspan><tspan fill="#ffffff">sudo grep "sudo:" /var/log/auth.log | tail -3</tspan></text>
    <text x="40" y="192" fill="#e6e6e6">Jun 19 14:30:01 ubuntu sudo: <tspan fill="#5FD75F">anthony</tspan> : TTY=pts/0 ; PWD=/home/anthony ; USER=root ;</text>
    <text x="40" y="208" fill="#e6e6e6">    COMMAND=/usr/bin/apt update</text>
    <text x="40" y="224" fill="#e6e6e6">Jun 19 14:31:15 ubuntu sudo: <tspan fill="#5FD75F">anthony</tspan> : TTY=pts/0 ; PWD=/home/anthony ; USER=root ;</text>
    <text x="40" y="240" fill="#e6e6e6">    COMMAND=/usr/bin/lynis audit system</text>
    <text x="40" y="268" font-size="13"><tspan fill="#5FD75F" font-weight="700">ubuntu@ubuntu</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#5FB4F3" font-weight="700">~</tspan><tspan fill="#ffffff">$ </tspan><tspan fill="#ffffff">sudo systemctl status auditd --no-pager</tspan></text>
    <text x="40" y="290" font-size="13" fill="#5FD75F">● auditd.service — Security Auditing Service</text>
    <text x="40" y="308" font-size="13" fill="#e6e6e6">     Active: <tspan fill="#5FD75F">active (running)</tspan> since Fri 2026-06-19 12:01 UTC</text>
    <text x="40" y="326" font-size="13" fill="#e6e6e6">   Main PID: 1183 (auditd)</text>
    <text x="40" y="350" font-size="13"><tspan fill="#5FD75F" font-weight="700">ubuntu@ubuntu</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#5FB4F3" font-weight="700">~</tspan><tspan fill="#ffffff">$ </tspan><tspan fill="#ffffff">█</tspan></text>
  </g>
</svg>
