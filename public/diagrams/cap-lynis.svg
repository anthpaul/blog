    <text x="38" y="306" fill="#5FD75F">[+] SSH support           [ DONE ]</text>
    <text x="38" y="324" fill="#5FD75F">[+] Firewalls             [ DONE ]</text>
    <text x="38" y="350" fill="#F7C97E">  Warnings (3):</text>
