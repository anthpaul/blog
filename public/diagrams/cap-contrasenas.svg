<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-labelledby="t d" font-family="'Ubuntu Mono','Menlo','Consolas',monospace">
  <title id="t">Salida del comando: política de contraseñas</title>
  <desc id="d">Salida simulada de pwquality.conf, login.defs y rechazo de contraseña débil.</desc>
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity=".18"/></filter>
  </defs>
  <rect width="720" height="380" fill="#fcefe9"/>
  <rect x="20" y="20" width="680" height="340" rx="10" fill="#300A24" filter="url(#sh)"/>
  <g font-size="13">
    <text x="40" y="56"><tspan fill="#5FD75F" font-weight="700">ubuntu@ubuntu</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#5FB4F3" font-weight="700">/etc/security</tspan><tspan fill="#ffffff">$ </tspan><tspan fill="#ffffff">sudo grep -vE "^#|^$" pwquality.conf</tspan></text>
    <text x="40" y="78" fill="#e6e6e6"><tspan fill="#C9AEF7">minlen</tspan>  = <tspan fill="#5FD75F">12</tspan></text>
    <text x="40" y="96" fill="#e6e6e6"><tspan fill="#C9AEF7">dcredit</tspan> = <tspan fill="#5FD75F">-1</tspan>    <tspan fill="#9a8b94"># al menos un dígito</tspan></text>
    <text x="40" y="114" fill="#e6e6e6"><tspan fill="#C9AEF7">ucredit</tspan> = <tspan fill="#5FD75F">-1</tspan>    <tspan fill="#9a8b94"># al menos una mayúscula</tspan></text>
    <text x="40" y="132" fill="#e6e6e6"><tspan fill="#C9AEF7">lcredit</tspan> = <tspan fill="#5FD75F">-1</tspan>    <tspan fill="#9a8b94"># al menos una minúscula</tspan></text>
    <text x="40" y="150" fill="#e6e6e6"><tspan fill="#C9AEF7">ocredit</tspan> = <tspan fill="#5FD75F">-1</tspan>    <tspan fill="#9a8b94"># al menos un símbolo</tspan></text>
    <text x="40" y="168" fill="#e6e6e6"><tspan fill="#C9AEF7">retry</tspan>   = <tspan fill="#5FD75F">3</tspan></text>
    <text x="40" y="196"><tspan fill="#5FD75F" font-weight="700">ubuntu@ubuntu</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#5FB4F3" font-weight="700">/etc/security</tspan><tspan fill="#ffffff">$ </tspan><tspan fill="#ffffff">grep -E "^PASS" /etc/login.defs</tspan></text>
    <text x="40" y="216" fill="#e6e6e6"><tspan fill="#C9AEF7">PASS_MAX_DAYS</tspan>   <tspan fill="#5FD75F">90</tspan></text>
    <text x="40" y="234" fill="#e6e6e6"><tspan fill="#C9AEF7">PASS_MIN_DAYS</tspan>   <tspan fill="#5FD75F">1</tspan></text>
    <text x="40" y="252" fill="#e6e6e6"><tspan fill="#C9AEF7">PASS_WARN_AGE</tspan>   <tspan fill="#5FD75F">7</tspan></text>
    <text x="40" y="280"><tspan fill="#5FD75F" font-weight="700">carlos@ubuntu</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#5FB4F3" font-weight="700">~</tspan><tspan fill="#ffffff">$ </tspan><tspan fill="#ffffff">passwd</tspan></text>
    <text x="40" y="300" fill="#e6e6e6">Changing password for carlos.</text>
    <text x="40" y="318" fill="#e6e6e6">Current password: <tspan fill="#9a8b94">●●●●●●●●●●●●</tspan></text>
    <text x="40" y="336" fill="#e6e6e6">New password: <tspan fill="#9a8b94">●●●●●</tspan></text>
    <text x="40" y="354" fill="#FF6B6B">BAD PASSWORD: The password is shorter than 12 characters</text>
  </g>
</svg>
