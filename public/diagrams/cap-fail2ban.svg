<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-labelledby="t d" font-family="'Ubuntu Mono','Menlo','Consolas',monospace">
  <title id="t">Salida del comando: estado de fail2ban</title>
  <desc id="d">Salida simulada de systemctl status fail2ban y fail2ban-client status sshd.</desc>
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity=".18"/></filter>
  </defs>
  <rect width="720" height="340" fill="#fcefe9"/>
  <rect x="20" y="20" width="680" height="300" rx="10" fill="#300A24" filter="url(#sh)"/>
  <g font-size="13">
    <text x="40" y="56"><tspan fill="#5FD75F" font-weight="700">ubuntu@ubuntu</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#5FB4F3" font-weight="700">~</tspan><tspan fill="#ffffff">$ </tspan><tspan fill="#ffffff">sudo systemctl status fail2ban --no-pager</tspan></text>
    <text x="40" y="76" fill="#5FD75F">● fail2ban.service — Fail2Ban Service</text>
    <text x="40" y="94" fill="#e6e6e6">     Active: <tspan fill="#5FD75F">active (running)</tspan> since Fri 2026-06-19 13:02 UTC</text>
    <text x="40" y="112" fill="#e6e6e6">       Docs: man:fail2ban(1)</text>
    <text x="40" y="140"><tspan fill="#5FD75F" font-weight="700">ubuntu@ubuntu</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#5FB4F3" font-weight="700">~</tspan><tspan fill="#ffffff">$ </tspan><tspan fill="#ffffff">sudo fail2ban-client status sshd</tspan></text>
    <text x="40" y="162" fill="#F7C97E">Status for the jail: sshd</text>
    <text x="40" y="180" fill="#e6e6e6">|- Filter</text>
